<template>
    <div class="slds-grid slds-grid_vertical-align-center slds-p-around_xx-small toolbar-row">

        <!-- Icon -->
        <div class="toolbar-icon">
            <lightning-icon icon-name="standard:settings" size="small"></lightning-icon>
        </div>

        <!-- Title -->
        <div class="toolbar-title slds-p-left_x-small">
            <h2 class="slds-text-heading_small slds-truncate">Configuration</h2>
        </div>

        <!-- Rule search -->
        <div class="toolbar-item slds-p-left_x-small">
            <lightning-input type="search" placeholder="Rule Name" onkeyup={handleSearchKeyUp} variant="label-hidden"
                class="compact-input"></lightning-input>
        </div>

        <!-- Beta rules toggle -->
        <div class="toolbar-item slds-p-left_x-small slds-align-middle">
            <lightning-input type="toggle" label="Beta" checked={showBeta} onchange={handleBetaToggle}
                message-toggle-active="Beta shown" message-toggle-inactive="Beta hidden" class="compact-toggle"
                variant="label-hidden"></lightning-input>
        </div>

        <!-- Load a JSON config (same shape as CLI / VS Code .flow-scanner.json) -->
        <div class="toolbar-item slds-p-left_x-small slds-align-middle import-file">
            <lightning-input type="file" label="Load JSON config" accept=".json,application/json"
                variant="label-hidden" onchange={handleConfigFile} class="compact-input"
                title="Load .flow-scanner.json (same format as CLI and VS Code)"></lightning-input>
        </div>
    </div>

    <template if:true={importMessage}>
        <div class="slds-p-horizontal_small slds-p-bottom_x-small" role="status">
            <span class={importMessageClass}>{importMessage}</span>
        </div>
    </template>
    <div class="table-card">
      <template if:true={rules}>
        <table class="slds-table slds-table_cell-buffer">
          <thead>
            <tr>
              <th data-field="isActive" onclick={handleHeaderSort}>Active {sortIndicators.isActive}</th>
              <th data-field="name" onclick={handleHeaderSort}>Rule Name {sortIndicators.name}</th>
              <th data-field="description" onclick={handleHeaderSort}>Description {sortIndicators.description}</th>
              <th data-field="severity" onclick={handleHeaderSort}>Severity {sortIndicators.severity}</th>
            </tr>
          </thead>
          <tbody>
            <tr class="toggle-all-row">
              <td colspan="4">
                <lightning-input
                  type="checkbox"
                  label={toggleAllLabel}
                  checked={allRulesEnabled}
                  onchange={handleToggleAllRules}
                  class="toggle-all-checkbox"
                ></lightning-input>
              </td>
            </tr>
            <template for:each={displayedRules} for:item="rule">
              <tr key={rule.id}>
                <td>
                  <lightning-input
                    type="checkbox"
                    checked={rule.isActive}
                    data-rule-id={rule.id}
                    onchange={handleRuleToggle}
                  ></lightning-input>
                </td>
                <td>
                  {rule.name}
                  <template if:true={rule.isBeta}>
                    <span class="beta-badge" title="Beta rule — disabled by default; results may change between releases">Beta</span>
                  </template>
                </td>
                <td class="wrap-text">{rule.description}</td>
                <td>
                  <lightning-combobox
                    data-rule-id={rule.id}
                    value={rule.severity}
                    options={severityOptions}
                    onchange={handleSeverityChange}
                  ></lightning-combobox>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </template>

      <template if:false={rules}>
        <p class="slds-p-horizontal_small slds-p-vertical_small">
          No rules available.
        </p>
      </template>
    </div>
     <div class="footer">
            <div class="github-info">
                Want to help improve&nbsp;
                <a href="https://flow-scanner.github.io/lightning-flow-scanner-core/" target="_blank">Lightning Flow Scanner</a>
                ?&nbsp;See our&nbsp;
                <a href="https://github.com/Flow-Scanner/lightning-flow-scanner-core?tab=contributing-ov-file" target="_blank">Contributing Guidelines</a>.
            </div>
        </div>
</template>
