<template>
    <div class="slds-grid slds-grid_vertical-align-center slds-p-around_xx-small toolbar-row">

        <!-- Icon -->
        <div class="toolbar-icon">
            <lightning-icon icon-name="custom:custom19" size="small"></lightning-icon>
        </div>

        <!-- Title -->
        <div class="toolbar-title slds-p-left_x-small">
            <h2 class="slds-text-heading_small slds-truncate">Flows</h2>
        </div>

        <!-- Name / Label -->
        <div class="toolbar-item slds-p-left_x-small">
            <lightning-input type="search" placeholder="Name or Label" onkeyup={handleNameKeyUp} variant="label-hidden"
                class="compact-input"></lightning-input>
        </div>

        <!-- Flow Type -->
        <div class="toolbar-item slds-p-left_x-small">
            <lightning-input type="search" placeholder="Flow Type" onkeyup={handleTypeKeyUp} variant="label-hidden"
                class="compact-input"></lightning-input>
        </div>

        <!-- Active Toggle -->
        <div class="toolbar-item slds-p-left_x-small slds-align-middle">
            <lightning-input type="toggle" label="Active" checked={activeOnly} onchange={handleToggleChange}
                class="compact-toggle" variant="label-hidden"></lightning-input>
        </div>
    </div>
    <div class="table-card">
        <template if:true={err}>
            <p class="slds-p-horizontal_small">Error fetching records: {err}</p>
        </template>

        <template if:false={records.length}>
            <p class="slds-p-horizontal_small">No flows available to scan</p>
        </template>

        <template if:true={displayedRecords.length}>
            <div class="custom-datatable">
                <table class="slds-table slds-table_cell-buffer full-width-table">
                    <thead>
                        <tr>
                            <th data-field="masterLabel" onclick={handleHeaderSort}>Label {sortIndicators.masterLabel}</th>
                            <th data-field="developerName" onclick={handleHeaderSort}>API Name {sortIndicators.developerName}</th>
                            <th data-field="processType" onclick={handleHeaderSort}>Process Type {sortIndicators.processType}</th>
                            <th data-field="lastModifiedDate" onclick={handleHeaderSort}>Last Modified Date {sortIndicators.lastModifiedDate}</th>
                            <th data-field="isActive" onclick={handleHeaderSort} class="center-cell">Is Active {sortIndicators.isActive}</th>
                            <th>Results</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template for:each={displayedRecords} for:item="r">
                            <tr key={r.id}>
                                <td title={r.masterLabel}>{r.masterLabel}</td>
                                <td title={r.developerName}>
                                    <a href={r.developerNameUrl} target="_blank" rel="noopener noreferrer">{r.developerName}</a>
                                </td>
                                <td title={r.processType}>{r.processType}</td>
                                <td class="center-cell">{r.lastModifiedFormatted}</td>
                                <td class="center-cell">
                                    <template if:true={r.isActive}>
                                        <lightning-icon icon-name="utility:check" size="xx-small"
                                            alternative-text="Active"></lightning-icon>
                                    </template>
                                </td>
                                <td>
                                    <button class="details-button" data-flow-id={r.id} onclick={handleDetailsClick}
                                        title="Click to see scan results">Details</button>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </template>

        <template if:true={hasMoreRecords}>
            <div class="slds-p-horizontal_small slds-p-vertical_x-small">
                <lightning-button label="Load More" variant="brand" onclick={handleLoadMore}></lightning-button>
            </div>
        </template>
    </div>
    <!-- Footer -->
    <div class="footer">
        <div class="github-info">
            Want to help improve&nbsp;
            <a href="https://flow-scanner.github.io/lightning-flow-scanner-core/" target="_blank">Lightning Flow
                Scanner</a>
            ?&nbsp;See our&nbsp;
            <a href="https://github.com/Flow-Scanner/lightning-flow-scanner-core?tab=contributing-ov-file"
                target="_blank">Contributing Guidelines</a>.
        </div>
    </div>
</template>
